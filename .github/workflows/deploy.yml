name: deploy

on:
  workflow_dispatch:

jobs:

  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up SSH key
        uses: webfactory/ubuntu@13.53.98.165
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Pull Docker image on EC2
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@<EC2_PUBLIC_IP> "
            docker pull andr266/user-service:latest
          "